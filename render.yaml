services:
  - type: web
    name: neurogenesis-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Build args passed to Docker at build time (Vite bakes VITE_ vars into the bundle)
    dockerBuildArgs:
      - VITE_API_BASE_URL=https://neurogenesis-ai.onrender.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Set these in the Render dashboard (Environment tab) — never commit real values
      - key: GROQ_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NVIDIA_NIM_API_KEY
        sync: false
      # VITE_CLERK_PUBLISHABLE_KEY must also be set in Render dashboard
      # so it gets passed as a Docker build arg at image build time
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
