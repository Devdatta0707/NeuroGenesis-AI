services:
  - type: web
    name: neurogenesis-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Build-time vars (Vite bakes these into the JS bundle)
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false   # set in Render dashboard
      - key: VITE_API_BASE_URL
        value: https://neurogenesis-ai.onrender.com
      # Runtime vars (set in Render dashboard — never commit real values)
      - key: GROQ_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NVIDIA_NIM_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
